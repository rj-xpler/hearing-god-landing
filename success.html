<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Success - Hear God's Voice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Fire success conversion event
      window.onload = function() {
        fetch("/track", {
          method: "POST",
          body: JSON.stringify({ event: "page_view", path: "/success", timestamp: Date.now() }),
        }).catch(() => {});
      };
    </script>
  </head>

  <body class="bg-gray-50 text-gray-900">
    <main class="min-h-screen flex flex-col justify-center items-center text-center px-6">
      <div class="bg-white p-10 rounded-xl shadow-sm border border-gray-100 max-w-lg w-full">
        <!-- Success Icon -->
        <div class="mx-auto w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mb-6">
          <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
          </svg>
        </div>
        
        <h1 class="text-2xl md:text-3xl font-bold mb-3">You're in!</h1>
        <p class="text-gray-600 mb-8">
          Check your email shortly for the first day of the course.<br>
          Let's start the journey.
        </p>

        <!-- Secondary CTA: App Download -->
        <div class="border-t border-gray-100 pt-8 mt-4">
          <p class="text-sm font-semibold uppercase tracking-wider text-gray-500 mb-4">Want the best experience?</p>
          <a
            href="https://messengerx.com/"
            target="_blank"
            class="block w-full bg-black text-white p-3 rounded font-semibold hover:bg-gray-800 transition"
          >
            Download the MessengerX App
          </a>
        </div>
      </div>
      
      <a href="/" class="mt-8 text-sm text-gray-500 hover:text-black transition">
        &larr; Return to main page
      </a>
    </main>
  </body>
</html>
